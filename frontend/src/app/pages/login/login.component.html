<div class="login-wrapper">
    <div class="login-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="login-card">
        <div class="brand-section">
            <div class="logo-circle">
                <i class="material-icons">local_hospital</i>
            </div>
            <h1>MedLink</h1>
            <p>Hệ thống y tế</p>
        </div>

        <div class="form-section">
            <div class="welcome-text">
                <h3>Chào mừng quay trở lại</h3>
                <p>Vui lòng đăng nhập để tiếp tục</p>
            </div>

            <div class="form-group">
                <label>Tài khoản</label>
                <div class="input-wrapper">

                    <input type="text" [(ngModel)]="loginData.username" placeholder="Nhập tên đăng nhập"
                        (keyup.enter)="onLogin()">
                </div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="input-wrapper">

                    <input type="password" [(ngModel)]="loginData.password" placeholder="Nhập mật khẩu"
                        (keyup.enter)="onLogin()">
                </div>
            </div>

            <div class="error-message" *ngIf="errorMessage">
                <i class="material-icons icon-error">error</i>
                <span>{{ errorMessage }}</span>
            </div>

            <button class="btn-login" (click)="onLogin()" [disabled]="isLoading">
                <span *ngIf="!isLoading">Đăng nhập</span>
                <span *ngIf="isLoading">Đang xác thực...</span>
                <i class="material-icons right-icon" *ngIf="!isLoading">arrow_forward</i>
            </button>

            <div class="footer-links">
                <a href="#">Quên mật khẩu?</a>
            </div>
        </div>
    </div>

    <div class="login-footer-text">
        <p>© 2025 MedLink. An toàn & Bảo mật.</p>
    </div>
</div>
