<div class="admin-layout">
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="brand">MedLink</div>
        </div>
        <ul class="nav-links">
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
                <a [routerLink]="['users']">
                    <i class="material-icons">people</i>
                    <span>Tài khoản</span>
                </a>
            </li>
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
                <a [routerLink]="['hospitals']">
                    <i class="material-icons">local_hospital</i>
                    <span>Bệnh viện</span>
                </a>
            </li>
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
                <a [routerLink]="['doctors']">
                    <i class="material-icons">medical_services</i>
                    <span>Bác sĩ</span>
                </a>
            </li>
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
                <a [routerLink]="['patients']">
                    <i class="material-icons">person</i>
                    <span>Bệnh nhân</span>
                </a>
            </li>
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
                <a [routerLink]="['tickets']">
                    <i class="material-icons">receipt_long</i>
                    <span>Phiếu tiếp đón</span>
                </a>
            </li>
            <li title="Đăng xuất">
                <a href="javascript:void(0)" (click)="logout()">
                    <i class="material-icons">logout</i>
                    <span>Đăng xuất</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h1>{{ pageTitle }}</h1>
            <div class="user-menu">Super Admin</div>
        </header>

        <div class="dashboard-content">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
