<div class="card">
    <div class="actions-bar">
        <div class="search-box">
            <input type="text" placeholder="Tìm kiếm..." [(ngModel)]="keyword" (keyup.enter)="loadHospitals()">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-pill btn-warning" *ngIf="selectedHospitalIds.size === 1"
                (click)="editSelectedHospital()">
                <i class="material-icons">edit</i> Sửa
            </button>
            <button class="btn-pill btn-danger" *ngIf="selectedHospitalIds.size > 0"
                (click)="deleteSelectedHospitals()">
                <i class="material-icons">delete</i> Xóa
            </button>
            <button class="btn-add" (click)="openModal()">
                <i class="material-icons">add</i> Thêm mới
            </button>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>
                    <input type="checkbox" (change)="toggleAllHospitals($event)">
                </th>
                <th>Tên bệnh viện</th>
                <th>Địa chỉ</th>
                <th>Số điện thoại</th>
                <th>Xem chuyên khoa</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let h of hospitals">
                <td>
                    <input type="checkbox" [checked]="isHospitalSelected(h.id)"
                        (change)="toggleHospitalSelection(h.id)">
                </td>
                <td>{{ h.name }}</td>
                <td>{{ h.address }}</td>
                <td>{{ h.phone }}</td>
                <td style="display: flex; gap: 5px;">
                    <button class="btn-action btn-edit" (click)="viewSpecialties(h)" title="Xem chuyên khoa">
                        <i class="material-icons">list</i>
                    </button>
                </td>
            </tr>
            <tr *ngIf="hospitals.length === 0">
                <td colspan="6" class="text-center">Không có dữ liệu</td>
            </tr>
        </tbody>
    </table>

    <div class="pagination" *ngIf="totalPages > 1">
        <button [disabled]="page === 0" (click)="onPageChange(page - 1)">
            <i class="material-icons">chevron_left</i>
        </button>
        <span>Trang {{ page + 1 }} / {{ totalPages }}</span>
        <button [disabled]="page === totalPages - 1" (click)="onPageChange(page + 1)">
            <i class="material-icons">chevron_right</i>
        </button>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="showModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>{{ currentHospitalId ? 'Cập nhật Bệnh viện' : 'Thêm Bệnh viện mới' }}</h2>
            <button class="close-btn" (click)="closeModal()">&times;</button>
        </div>
        <div class="modal-body" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Tên bệnh viện</label>
                <input type="text" class="form-control" [(ngModel)]="hospitalForm.name">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" [(ngModel)]="hospitalForm.phone">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" [(ngModel)]="hospitalForm.email">
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select class="form-control" [(ngModel)]="hospitalForm.status">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Ngừng hoạt động</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Địa chỉ</label>
                <input type="text" class="form-control" [(ngModel)]="hospitalForm.address">
            </div>
        </div>
        <div class="modal-footer" style="padding: 1rem; text-align: right;">
            <button class="btn-primary" (click)="saveHospital()">Lưu</button>
        </div>
    </div>
</div>
