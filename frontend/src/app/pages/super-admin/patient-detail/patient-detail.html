<div class="sub-header">
    <button class="btn-action" (click)="goBack()" title="Quay lại">
        <i class="material-icons">arrow_back</i>
    </button>
    <h3>Hồ sơ bệnh nhân: {{ patientProfile?.fullName || patientId }}</h3>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
    <!-- Allergies -->
    <div class="card">
        <h4>Dị ứng</h4>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Tên dị ứng</th>
                    <th>Mức độ</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let a of patientAllergies">
                    <td>{{ a.allergyName }}</td>
                    <td>{{ a.severity }}</td>
                </tr>
                <tr *ngIf="patientAllergies.length === 0">
                    <td colspan="2" class="text-center">Chưa có dữ liệu</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Diseases -->
    <div class="card">
        <h4>Bệnh mãn tính</h4>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Tên bệnh</th>
                    <th>Ngày phát hiện</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let d of patientDiseases">
                    <td>{{ d.diseaseName }}</td>
                    <td>{{ d.diagnosedDate | date:'dd/MM/yyyy' }}</td>
                </tr>
                <tr *ngIf="patientDiseases.length === 0">
                    <td colspan="2" class="text-center">Chưa có dữ liệu</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
